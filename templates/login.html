<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Analyst Auth | Agentic SOC</title>
    <link rel="stylesheet" href="/static/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="notification" class="notification"></div>

    <!-- Login View -->
    <div id="login-view" class="auth-container">
        <div class="auth-brand">
            <h1>Welcome Back</h1>
            <p>Enter your credentials to access the SOC</p>
        </div>
        <form id="login-form" class="auth-form">
            <div class="form-group">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" name="username" placeholder="analyst_smith" required>
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="auth-btn">Authorize Login</button>
        </form>
        <div class="auth-footer">
            Don't have an account? <span id="show-signup" class="auth-link">Sign Up</span>
        </div>
    </div>

    <!-- Signup View -->
    <div id="signup-view" class="auth-container hidden">
        <div class="auth-brand">
            <h1>Create Account</h1>
            <p>Register as a new SOC Analyst</p>
        </div>
        <form id="signup-form" class="auth-form">
            <div class="form-group">
                <label for="signup-username">Username</label>
                <input type="text" id="signup-username" name="username" placeholder="analyst_new" required>
            </div>
            <div class="form-group">
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" name="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="signup-confirm">Confirm Password</label>
                <input type="password" id="signup-confirm" name="confirm_password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="auth-btn">Complete Registration</button>
        </form>
        <div class="auth-footer">
            Already have an account? <span id="show-login" class="auth-link">Log In</span>
        </div>
    </div>

    <script src="/static/auth.js"></script>
</body>
</html>
